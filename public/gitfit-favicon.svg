<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&amp;display=swap');</style>
  </defs>
  <!-- Background squircle -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- G block: dark -->
  <rect x="4" y="6" width="11" height="20" rx="3" fill="#1e2530"/>
  <!-- F block: orange -->
  <rect x="17" y="6" width="11" height="20" rx="3" fill="#FC4C02"/>
  <!-- Letters -->
  <text x="9.5" y="20" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" font-weight="800" fill="white">G</text>
  <text x="22.5" y="20" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" font-weight="800" fill="white">F</text>
</svg>
